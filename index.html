<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오늘의 손담</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --peach: #FFF3EC;
  --peach-mid: #FFE0CC;
  --orange: #FF7A3D;
  --orange-dark: #E05E24;
  --brown: #5C3A1E;
  --brown-light: #A0673A;
  --green: #2E9B6E;
  --green-bg: #E8F7F0;
  --text: #2C1A0E;
  --sub: #9B7560;
}

html, body {
  min-height: 100%;
  background: var(--peach);
  font-family: 'Noto Sans KR', sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem 1.25rem;
}

/* 상태: 열기 전 */
#view-before {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  width: 100%;
  max-width: 340px;
}

.cookie-wrap {
  position: relative;
  width: 220px;
  height: 220px;
  margin-bottom: 2rem;
  cursor: pointer;
}
.cookie-img {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 120px;
  line-height: 1;
  filter: drop-shadow(0 8px 24px rgba(255,122,61,0.25));
  transition: transform 0.15s ease;
  user-select: none;
}
.cookie-img:active { transform: scale(0.93); }
.cookie-pulse {
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 2px solid var(--peach-mid);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.08); opacity: 0.3; }
}

.before-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--sub);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.before-title {
  font-size: 26px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.03em;
  text-align: center;
  line-height: 1.2;
  margin-bottom: 0.4rem;
}
.before-sub {
  font-size: 14px;
  color: var(--sub);
  text-align: center;
  line-height: 1.6;
  margin-bottom: 2rem;
}

.btn-open {
  width: 100%;
  padding: 18px;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 16px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: -0.01em;
  box-shadow: 0 4px 0 var(--orange-dark);
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-open:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 var(--orange-dark);
}

/* 상태: 열린 후 */
#view-after {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  width: 100%;
  max-width: 340px;
}
#view-after.show { display: flex; }

.result-card {
  width: 100%;
  background: #fff;
  border-radius: 24px;
  padding: 2.5rem 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  box-shadow: 0 2px 32px rgba(255,122,61,0.10);
  animation: reveal 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
  position: relative;
  overflow: hidden;
}
.result-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--orange), #FFB347);
  border-radius: 24px 24px 0 0;
}
@keyframes reveal {
  from { opacity: 0; transform: scale(0.88) translateY(16px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.result-tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--orange);
  text-transform: uppercase;
}
.result-icon { font-size: 56px; line-height: 1; }
.result-word {
  font-size: 32px;
  font-weight: 900;
  color: var(--text);
  text-align: center;
  letter-spacing: -0.03em;
  line-height: 1.3;
}

.btn-padlet {
  width: 100%;
  padding: 15px;
  background: var(--green-bg);
  color: var(--green);
  border: 1.5px solid rgba(46,155,110,0.22);
  border-radius: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background 0.12s, transform 0.1s;
  letter-spacing: -0.01em;
}
.btn-padlet:active { transform: scale(0.98); background: #d2f0e4; }

.btn-again {
  background: none;
  border: none;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--sub);
  cursor: pointer;
  padding: 8px;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.foot {
  font-size: 11px;
  color: var(--peach-mid);
  margin-top: 1rem;
  letter-spacing: 0.03em;
}
</style>
</head>
<body>

<!-- 열기 전 -->
<div id="view-before">
  <div class="before-label">AAC · 손담 복습</div>
  <div class="cookie-wrap" onclick="openCookie()">
    <div class="cookie-pulse"></div>
    <div class="cookie-img">🥠</div>
  </div>
  <div class="before-title">오늘의 손담은<br>무엇일까요?</div>
  <div class="before-sub">쿠키를 눌러서<br>오늘의 손담을 확인하세요</div>
  <button class="btn-open" onclick="openCookie()">✨ 오늘의 손담 열기</button>
</div>

<!-- 열린 후 -->
<div id="view-after">
  <div class="result-card">
    <div class="result-tag">오늘의 손담</div>
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-word" id="resultWord"></div>
  </div>
  <a class="btn-padlet" id="btnPadlet" href="#" target="_blank">
    📗 패들렛에서 자세히 보기
  </a>
  <button class="btn-again" onclick="reset()">다시 뽑기</button>
</div>

<div class="foot">손담(손으로 나누는 담화) · AAC 복습용</div>

<script>
const data = [
  {w:"가다",                              icon:"🚶", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/XGyBQbXoYNbgWL6K"},
  {w:"그만하다 (멈추다)",                 icon:"✋", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/kxodWG2GVvbJZgP7"},
  {w:"기다리다",                          icon:"⏳", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/1xkVaqGbdEz1Zl0e"},
  {w:"내일",                              icon:"📅", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/KxJvagYdzp18ZAg0"},
  {w:"느리다 / 천천히",                  icon:"🐢", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/x5A7arGdD5oPQwr6"},
  {w:"마시다 / 목마르다 / 물",           icon:"💧", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/e9YpQN9Dn8JDaxjM"},
  {w:"먹다 / 식사 / 간식",               icon:"🍱", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/E851Q0vGqmVOWVAb"},
  {w:"목욕하다",                          icon:"🛁", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/PR3NWxG9q6rpZb0O"},
  {w:"배고프다",                          icon:"😋", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/jpoxaj2Bzg80abPE"},
  {w:"병원",                              icon:"🏥", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/J24jaloOVBj0W0A1"},
  {w:"불편하다",                          icon:"😣", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/E851Q0Oz71q0aVAb"},
  {w:"싫다",                              icon:"🙅", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/zV61Q6xNeEKbWO98"},
  {w:"아프다",                            icon:"🤕", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/x5A7arGBOX4XQwr6"},
  {w:"안녕 (안녕하세요, 안녕히 계세요)",icon:"👋", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/4b3zaM0dpVgkW2j7"},
  {w:"예 (응, 그래)",                    icon:"👍", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/LNV1Q70wpLMPZmq3"},
  {w:"잠깐만 / 다음에",                  icon:"🤚", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/do3MQJP5Y8qkW15w"},
  {w:"조심하다",                          icon:"⚠️", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/R7dXadN7rXNlZ6bl"},
  {w:"좀 더",                             icon:"➕", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/YDgnZe13v501ZwrA"},
  {w:"좋다 / 잘하다",                    icon:"⭐", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/j40PQDyG6v8kZvXB"},
  {w:"주다",                              icon:"🤲", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/jpoxajkneGJ7QbPE"},
  {w:"주세요",                            icon:"🙏", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/R7dXadNO0BkDZ6bl"},
  {w:"지금 / 오늘",                      icon:"📍", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/LNV1Q70gx18jZmq3"},
  {w:"차갑다 / 춥다",                    icon:"🥶", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/4b3zaM0d2yV9W2j7"},
  {w:"피곤하다 / 쉬다",                  icon:"😴", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/O7A9QmwxyprlW6x3"},
  {w:"하고 싶다",                         icon:"💪", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/e9YpQN9Dn6nEaxjM"},
  {w:"함께 / 함께하다",                  icon:"🤝", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/mDRxWBq1PmxqZjb1"},
  {w:"화장실 / 소변보다",                icon:"🚻", url:"https://padlet.com/eggfam99/padlet-26t1epn45zbrgyt/wish/goElQyGqAndbW3yY"}
];

function openCookie() {
  const item = data[Math.floor(Math.random() * data.length)];
  document.getElementById('resultIcon').textContent = item.icon;
  document.getElementById('resultWord').textContent = item.w;
  document.getElementById('btnPadlet').href = item.url;
  document.getElementById('view-before').style.display = 'none';
  const after = document.getElementById('view-after');
  after.classList.add('show');
}

function reset() {
  document.getElementById('view-after').classList.remove('show');
  document.getElementById('view-before').style.display = 'flex';
}
</script>
</body>
</html>
